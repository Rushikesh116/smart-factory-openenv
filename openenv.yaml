name: Smart Factory Optimization
version: 1.0.0
description: A Reinforcement Learning environment for optimizing machine scheduling, energy consumption, and maintenance in a smart factory.

tags:
  - openenv

observation_space:
  type: object
  properties:
    machines:
      type: array
      items:
        type: object
        properties:
          id: { type: string }
          status: { type: string, enum: [idle, busy, broken, maintenance, intermittent_failure] }
          health: { type: number, minimum: 0, maximum: 1 }
          energy_usage: { type: number, minimum: 0 }
          current_job_id: { type: [string, "null"] }
          remaining_time: { type: integer, minimum: 0 }
    job_queue:
      type: array
      items:
        type: object
        properties:
          id: { type: string }
          processing_time: { type: integer, minimum: 1 }
          priority: { type: integer, minimum: 1, maximum: 3 }
          arrival_time: { type: integer, minimum: 0 }
          waiting_time: { type: integer, minimum: 0 }
    energy_budget: { type: number, minimum: 0 }
    current_energy_usage: { type: number, minimum: 0 }
    throughput: { type: number, minimum: 0 }
    delay: { type: number, minimum: 0 }
    queue_length: { type: integer, minimum: 0 }
    breakdown_risk: { type: number, minimum: 0, maximum: 1 }
    time_step: { type: integer, minimum: 0 }
    total_reward: { type: number }
    jobs_completed: { type: integer, minimum: 0 }
    max_steps: { type: integer, minimum: 1 }
    done: { type: boolean }

action_space:
  type: object
  properties:
    type: { type: string, enum: [assign, delay, maintenance, do_nothing] }
    job_id: { type: string }
    machine_id: { type: string }
  required: [type]

reward_function:
  components:
    energy_component:
      description: Normalized energy-efficiency score with 0.4 weight.
      formula: "0.4 * (1 - current_energy_usage / max(energy_budget * 1.25, 1))"
    throughput_component:
      description: Normalized completion score with 0.4 weight.
      formula: "0.4 * (jobs_completed / max(jobs_completed + queue_length, 1))"
    delay_component:
      description: Normalized low-latency score with 0.2 weight.
      formula: "0.2 * (1 - delay / max(max_steps * 0.5, 5))"
    breakdown_risk_penalty:
      description: Penalty applied when machine health and load imply elevated failure risk.
      formula: "-0.2 * breakdown_risk"

grading_criteria:
  throughput: 40%
  energy_efficiency: 40%
  low_latency: 20%
  score_bounds: "(0.01, 0.99)"

tasks:
  - id: easy
    description: Optimize energy efficiency in a small factory
  - id: medium
    description: Maximize throughput under moderate load
  - id: hard
    description: Minimize delay in high-load failure-prone environment